reporter: xcode

disabled_rules:
  - line_length
  - file_length
  - type_body_length
  - function_body_length
  - force_cast
  - force_try
  - cyclomatic_complexity

enabled_rules:
  - trailing_whitespace
  - trailing_newline
  - opening_brace
  - closing_brace
  - colon
  - comma
  - return_arrow_whitespace

excluded:
  - .build
  - Pods
  - Carthage
  - .swiftpm
